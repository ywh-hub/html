<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>图书商城</title>
    <link rel="stylesheet" href="../CSS/lab2-2503-108-index.css">
</head>
<body>
    <!-- 头部区域 -->
    <div class="header">
        <div class="header-content">
            <div class="logo">图书商城</div>
            <div class="nav-menu">
                <ul>
                    <li><a href="#">首页</a></li>
                    <li><a href="#">图书分类</a></li>
                    <li><a href="#">热销排行</a></li>
                </ul>
            </div>
        </div>
    </div>

    <!-- 主体内容区 -->
    <div class="container">
        <!-- 左侧栏 -->
        <div class="left-column">
            <div class="category-nav">
                <h3>图书分类</h3>
                <ul>
                    <li><a href="#">文学小说</a></li>
                    <li><a href="#">历史传记</a></li>
                    <li><a href="#">经济管理</a></li>
                </ul>
            </div>
        </div>

        <!-- 中间栏 -->
        <div class="middle-column">
            <div class="book-display">
                <h3>精选图书</h3>
                <div class="book-grid">
                    <div class="book-item">
                        <img src="../img/book1.jpg" alt="图书1">
                        <div class="book-info">
                            <h4>朱自清散文精选集</h4>
                            <p class="book-price">¥38.00</p>
                        </div>
                        <div class="book-overlay">
                            <button>加入购物车</button>
                        </div>
                    </div>

                    <div class="book-item">
                        <img src="../img/book2.jpg" alt="图书2">
                        <div class="book-info">
                            <h4>史记</h4>
                            <p class="book-price">¥45.00</p>
                        </div>
                        <div class="book-overlay">
                            <button>加入购物车</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="hot-recommend">
                <h3>热门推荐</h3>
                <div class="hot-books">
                    <div class="hot-book-item">
                        <img src="../img/hot1.jpg" alt="热门图书1">
                        <div class="hot-book-info">
                            <h4>百年孤独</h4>
                            <p>¥48.00</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="new-books">
                <h3>新书上市</h3>
                <table class="new-books-table">
                    <tr>
                        <th>书名</th>
                        <th>作者</th>
                        <th>价格</th>
                    </tr>
                    <tr>
                        <td>《思考，快与慢》</td>
                        <td>丹尼尔·卡尼曼</td>
                        <td>¥38.00</td>
                    </tr>
                </table>
            </div>
        </div>

        <!-- 右侧栏 -->
        <div class="right-column">
            <div class="promotion">
                <h3>促销信息</h3>
                <div class="promotion-item">
                    <img src="../img/promo1.jpg" alt="促销1">
                    <h4>满30减10</h4>
                    <p>限时优惠</p>
                    <button>立即抢购</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
